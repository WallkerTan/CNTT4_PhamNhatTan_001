<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book List</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<form method="get">
    <input type="search" name="keyword" placeholder="Search...">
    <button type="submit">Search</button>

    <a th:href="@{/book/add}">Add</a>
    <table border="1">
        <thead>
        <tr>
            <th>STT</th>
            <th>Title</th>
            <th>Author</th>
            <th>Quantity</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="b : ${books}">
            <td th:text="${b.id}"></td>
            <td th:text="${b.title}"></td>
            <td th:text="${b.author}"></td>
            <td th:text="${b.quantity}"></td>

            <td>
            <img th:src="${b.coverImage}" width="80" alt="Cover">   <!-- ĐÚNG -->
        </td>

            <td>
                <a th:href="@{/book/update/{id}(id=${b.id})}" class="btn btn-warning">Sửa</a>
                <a th:href="@{/book/delete/{id}(id=${b.id})}" class="btn btn-danger">Xóa</a>
            </td>
        </tr>

        </tbody>
    </table>
</form>


</body>
</html>
