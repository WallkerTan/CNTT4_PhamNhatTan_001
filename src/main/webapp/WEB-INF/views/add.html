<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form action="" method="post" th:object="${book}">
    <label>title</label>
    <input type="text" name="title" th:field="*{title}">
    <label>author</label>
    <input type="text" name="author" th:field="*{author}">
    <label>quantity</label>
    <input type="text" name="quantity" th:field="*{quantity}">
    <label>coverImage</label>
    <input type="text" name="coverImage" th:field="*{coverImage}">
    <button type="submit">submit</button>

</form>
</body>
</html>
